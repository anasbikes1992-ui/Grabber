publish_to: 'none'

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  supabase_flutter: ^2.5.0
  dio: ^5.4.3
  flutter_secure_storage: ^9.2.2
  riverpod: ^2.5.1
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.7
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
